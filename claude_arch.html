<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Architecture</title>
<!-- =========================================================================
     CLAUDE CODE ARCHITECTURE — diagrama interativo em camadas
     Arquivo único (HTML + CSS + JS) · sem dependências externas
     Estilo: infográfico corporativo, fundo creme, título "pixel", conectores
     Recriado por Groehs
     ========================================================================= -->
<style>
/* =========================================================================
   1) TOKENS
   ========================================================================= */
:root{
  --paper:#efece5;          /* fundo creme */
  --paper-2:#f6f4ef;
  --card:#ffffff;
  --card-line:#e5e0d6;
  --ink:#2a2f36;
  --ink-soft:#5c6169;
  --ink-mute:#948d80;
  --layer-line:#b8b1a4;     /* borda tracejada das camadas */
  --layer-label:#6d675c;

  /* acentos */
  --orange:#ea6a26; --orange-d:#c9501a;
  --purple:#7c56e6;
  --green:#1f9e63;
  --blue:#3579d6;
  --teal:#12ada0;
  --dark:#2b3038;
  --red:#d0552b;

  --shadow:0 1px 2px rgba(40,30,10,.05), 0 6px 16px rgba(40,30,10,.08);
  --shadow-h:0 10px 26px rgba(40,30,10,.16);
  --ff:"Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  --fm:"Cascadia Code","SF Mono","JetBrains Mono", ui-monospace, Consolas, monospace;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:var(--ff); color:var(--ink);
  background:
    radial-gradient(900px 380px at 50% -6%, rgba(234,106,38,.06), transparent 70%),
    var(--paper);
  min-height:100vh;
}

/* =========================================================================
   2) CABEÇALHO / TÍTULO "PIXEL"
   ========================================================================= */
.head{text-align:center;padding:26px 16px 6px}
.title-block{display:inline-flex;align-items:center;gap:14px;background:#fbe9dc;padding:8px 22px;border-radius:12px;
  box-shadow:0 3px 0 rgba(201,80,26,.18)}
.spark{color:var(--orange);font-size:clamp(26px,5vw,46px);line-height:1;transform:translateY(2px)}
.title{
  font-family:var(--fm); font-weight:800; text-transform:uppercase; letter-spacing:3px; margin:0;
  font-size:clamp(22px,5vw,50px); color:var(--orange);
  text-shadow:2px 0 var(--orange-d), 3px 2px #a83f12, 5px 4px rgba(0,0,0,.16);
}
.subhead{margin:12px 0 2px;color:var(--ink-soft);font-size:13.5px}
.toolbar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.btn{font-family:var(--ff);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--card-line);
  background:#fff;color:var(--ink);border-radius:99px;padding:9px 16px;transition:.15s;box-shadow:var(--shadow)}
.btn:hover{border-color:var(--ink-mute)}
.btn.primary{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn.primary:hover{background:var(--orange-d)}
.btn.on{background:var(--teal);border-color:var(--teal);color:#fff}

/* =========================================================================
   3) PALCO ESCALÁVEL (canvas fixo 1200x790 que escala para a largura)
   ========================================================================= */
#frame{width:100%;overflow-x:auto;padding:10px 0 40px}
#scaler{margin:0 auto;transform-origin:top left}
#stage{position:relative;width:1200px;height:790px}

/* camadas (containers tracejados) */
.layer{position:absolute;border:2px dashed var(--layer-line);border-radius:16px;background:rgba(255,255,255,.16)}
.layer > .llabel{position:absolute;top:10px;left:16px;font-size:13px;font-weight:800;letter-spacing:.6px;color:var(--layer-label)}

/* cards */
.node{position:absolute;background:var(--card);border:1.5px solid var(--card-line);border-radius:14px;
  padding:10px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s, box-shadow .16s, border-color .16s;
  display:flex;flex-direction:column;gap:6px}
.node:hover{transform:translateY(-3px);box-shadow:var(--shadow-h);border-color:var(--acc)}
.node.hl{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc), var(--shadow-h)}
.node .chip{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
  background:color-mix(in srgb,var(--acc) 14%, #fff);border:1px solid color-mix(in srgb,var(--acc) 30%, #fff)}
.node .chip svg{width:20px;height:20px;stroke:var(--acc);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.node .nt{font-size:13px;font-weight:750;line-height:1.15;letter-spacing:-.2px}
.node .ns{font-size:10.5px;color:var(--ink-soft);line-height:1.35}
.node .top{display:flex;align-items:center;gap:9px}
.node.center-emph{border:2px solid var(--orange);border-radius:16px}
.node.center-emph .nt{font-size:15px}
.node.dark{background:var(--dark);border-color:#1f242b}
.node.dark .nt{color:#fff} .node.dark .ns{color:#b9c0c9}
.node.dark .chip{background:#3a414b;border-color:#4a525d}
.node.dark .chip svg{stroke:#fff}

/* badges (tool dispatch) */
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.badge{font-family:var(--fm);font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;letter-spacing:.2px}
.b-bash{background:#fbe4d3;color:#c85a1e}.b-read{background:#d8f0e2;color:#1f8a5a}
.b-write{background:#d7e6fb;color:#2b6fd6}.b-glob{background:#d3efee;color:#128c86}
.b-grep{background:#efe0f7;color:#8a4dbf}.b-revert{background:#f8dcd6;color:#c9432a}

/* tags (pílulas soltas) */
.tag{position:absolute;font-size:10px;font-weight:600;border-radius:8px;padding:5px 9px;line-height:1.2;
  display:flex;align-items:center;text-align:center;box-shadow:var(--shadow)}
.tag.orange{background:#f6e2d2;color:#b9541f;border:1px solid #ecc7ad}
.tag.gray{background:#e9e6df;color:#6f6a5f;border:1px solid #dcd8cf;font-family:var(--fm);font-size:9.5px}

/* =========================================================================
   4) CONECTORES (SVG)
   ========================================================================= */
#wires{position:absolute;inset:0;width:1200px;height:790px;pointer-events:none;overflow:visible}
#wires path{fill:none;transition:stroke-width .15s, opacity .15s}
#wires path.solid{stroke:var(--orange);stroke-width:2.2}
#wires path.dash{stroke:#a49c8d;stroke-width:1.7;stroke-dasharray:6 5}
#wires path.hot{stroke-width:3.4;filter:drop-shadow(0 0 4px rgba(234,106,38,.5))}
#wires path.hot.dash{stroke:var(--orange)}
#wires.playing path.dash{animation:march 1s linear infinite}
@keyframes march{to{stroke-dashoffset:-22}}
.elabel{font-family:var(--fm);font-size:10px;fill:#8a8271;font-style:italic}
#particles circle{fill:var(--teal);filter:drop-shadow(0 0 5px rgba(18,173,160,.8))}

/* =========================================================================
   5) MODAL
   ========================================================================= */
.overlay{position:fixed;inset:0;background:rgba(30,24,12,.34);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:.2s;z-index:40}
.overlay.open{opacity:1;pointer-events:auto}
.modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-46%) scale(.97);width:min(440px,92vw);
  background:#fff;border-radius:18px;box-shadow:0 26px 70px rgba(20,15,5,.4);opacity:0;pointer-events:none;
  transition:.2s;z-index:41;overflow:hidden}
.modal.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.modal .mh{padding:20px 22px 16px;position:relative;border-bottom:1px solid #eee}
.modal .mh::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--macc)}
.modal .mcat{font-family:var(--fm);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--macc);font-weight:700}
.modal .mtr{display:flex;align-items:center;gap:12px;margin-top:8px}
.modal .mic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;background:color-mix(in srgb,var(--macc) 14%, #fff);border:1px solid color-mix(in srgb,var(--macc) 30%,#fff)}
.modal .mic svg{width:24px;height:24px;stroke:var(--macc);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.modal h3{margin:0;font-size:19px;font-weight:800;letter-spacing:-.3px}
.modal .msub{font-family:var(--fm);font-size:11px;color:var(--ink-mute);margin-top:2px}
.modal .mb{padding:18px 22px 22px}
.modal .mb p{margin:0;font-size:14px;line-height:1.6;color:var(--ink)}
.modal .mclose{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:8px;border:1px solid #e5e0d6;background:#fff;color:var(--ink-soft);cursor:pointer;font-size:15px}
.modal .mclose:hover{color:#000}

footer{text-align:center;color:var(--ink-mute);font-size:12px;padding:6px 16px 30px}

@media (max-width:520px){ .subhead{font-size:12px} }
</style>
</head>
<body>

<!-- =========================================================================
     HTML
     ========================================================================= -->
<div class="head">
  <div class="title-block"><span class="spark">✳</span><h1 class="title">Claude Code Architecture</h1></div>
  <p class="subhead">Um mapa das camadas de um agente de código — da entrada humana ao resultado verificado. Passe o mouse para ver as conexões · clique para detalhes.</p>
  <div class="toolbar">
    <button class="btn primary" id="playBtn">▶ Animar fluxo</button>
    <button class="btn" id="fitBtn">⤢ Ajustar à tela</button>
  </div>
</div>

<div id="frame">
  <div id="scaler">
    <div id="stage">
      <svg id="wires">
        <defs>
          <marker id="ar-orange" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9z" fill="#ea6a26"/></marker>
          <marker id="ar-gray" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9z" fill="#a49c8d"/></marker>
        </defs>
      </svg>
      <svg id="particles" style="position:absolute;inset:0;width:1200px;height:790px;pointer-events:none;overflow:visible"></svg>
      <!-- camadas, nós e tags injetados via JS -->
    </div>
  </div>
</div>

<footer>Diagrama interativo · recriado por Groehs</footer>

<!-- MODAL -->
<div class="overlay" id="overlay"></div>
<div class="modal" id="modal" role="dialog" aria-modal="true">
  <div class="mh"><button class="mclose" id="mClose">✕</button>
    <span class="mcat" id="mCat">Camada</span>
    <div class="mtr"><span class="mic" id="mIcon"></span><div><h3 id="mTitle">Nó</h3><div class="msub" id="mSub"></div></div></div>
  </div>
  <div class="mb"><p id="mDesc"></p></div>
</div>

<script>

   JAVASCRIPT
   6) BIBLIOTECA DE ÍCONES (SVG inline)
   ========================================================================= */

const ic = t => `<svg viewBox="0 0 24 24">${ICON[t]||''}</svg>`;

/* =========================================================================
   7) DADOS · camadas, nós, tags, conexões
   ========================================================================= */

const TAGS = [

// alguns tags também são âncoras de conexão

/* âncoras */
function rectOf(id){ return NODES[id] || TAGNODE[id]; }
function A(id,side){
  const n=rectOf(id); const cx=n.x+n.w/2, cy=n.y+n.h/2;
  return side==='r'?[n.x+n.w,cy]:side==='l'?[n.x,cy]:side==='t'?[cx,n.y]:side==='b'?[cx,n.y+n.h]:[cx,cy];
}

/* conexões: pts (waypoints), estilo, seta, rótulo */
const EDGES = [
  {p:[A('ui','r'),A('session','l')], k:'solid', arrow:1, ns:['ui','session']},
  {p:[A('session','b'),A('perm','t')], k:'solid', arrow:1, ns:['session','perm']},
  {p:[[164,371],[198,384]], k:'solid', arrow:1, ns:['perm']},
  {p:[[326,398],[452,398],[476,428]], k:'dash', arrow:1, label:'observes everything', lp:[338,390], ns:['perm','master']},
  {p:[A('skill','b'),A('taskgraph','t')], k:'dash', ns:['skill','taskgraph']},
  {p:[A('ctxcomp','b'),A('memory','t')], k:'dash', ns:['ctxcomp','memory']},
  {p:[[754,204],[735,192]], k:'dash', ns:['ctxcomp']},
  {p:[[482,320],[482,360],[520,360],[520,378]], k:'dash', arrow:1, label:'feeds', lp:[486,352], ns:['taskgraph','master']},
  {p:[[668,320],[668,360],[620,360],[620,378]], k:'dash', arrow:1, label:'feeds', lp:[626,352], ns:['memory','master']},
  {p:[A('master','r'),A('tool','l')], k:'solid', arrow:1, ns:['master','tool']},
  {p:[A('tool','r'),A('stream','l')], k:'solid', arrow:1, ns:['tool','stream']},
  {p:[A('stream','r'),A('result','l')], k:'solid', arrow:1, ns:['stream','result']},
  {p:[[932,478],[932,500]], k:'dash', arrow:1, label:'cache_control', lp:[938,490], ns:['stream','cache']},
  {p:[A('mcp','r'),A('ext','l')], k:'dash', ns:['mcp','ext']},
  {p:[[948,300],[948,352],[932,352],[932,378]], k:'dash', arrow:1, label:'register tools', lp:[954,332], ns:['mcp','stream']},
  {p:[[540,496],[540,560],[437,560],[437,632]], k:'dash', arrow:1, label:'spawned', lp:[492,548], ns:['master','sub']},
  {p:[[640,632],[640,556],[605,556],[605,496]], k:'dash', arrow:1, label:'FROM', lp:[648,552], ns:['fsm','master']},
  {p:[A('sub','r'),A('mail','l')], k:'solid', arrow:1, ns:['sub','mail']},
  {p:[A('mail','r'),A('fsm','l')], k:'solid', arrow:1, ns:['mail','fsm']},
  {p:[A('fsm','r'),A('board','l')], k:'solid', arrow:1, ns:['fsm','board']},
  {p:[A('board','r'),A('worktree','l')], k:'solid', arrow:1, ns:['board','worktree']},
  {p:[A('worktree','r'),A('conflict','l')], k:'solid', arrow:1, ns:['worktree']}
];

/* =========================================================================
   8) RENDER
   ========================================================================= */
const stage=document.getElementById('stage');
const wires=document.getElementById('wires');
const parts=document.getElementById('particles');
const NS='http://www.w3.org/2000/svg';

// camadas
LAYERS.forEach(L=>{
  const d=document.createElement('div'); d.className='layer';
  d.style.cssText=`left:${L.x}px;top:${L.y}px;width:${L.w}px;height:${L.h}px`;
  d.innerHTML=`<span class="llabel">${L.label}</span>`;
  stage.appendChild(d);
});
FREE_LABELS.forEach(F=>{
  const s=document.createElement('div');
  s.style.cssText=`position:absolute;left:${F.x}px;top:${F.y}px;font-size:13px;font-weight:800;letter-spacing:.6px;color:var(--layer-label)`;
  s.textContent=F.text; stage.appendChild(s);
});

// tags
TAGS.forEach(T=>{
  const d=document.createElement('div'); d.className=`tag ${T.cls}`;
  d.style.cssText=`left:${T.x}px;top:${T.y}px;width:${T.w}px;min-height:${T.h}px;justify-content:center`;
  d.textContent=T.text; stage.appendChild(d);
});

// conectores
function pathD(pts){ return pts.map((p,i)=>(i?'L':'M')+p[0]+' '+p[1]).join(' '); }
EDGES.forEach((e,i)=>{
  const path=document.createElementNS(NS,'path');
  path.setAttribute('d',pathD(e.p));
  path.setAttribute('class', e.k);
  if(e.arrow) path.setAttribute('marker-end', e.k==='solid'?'url(#ar-orange)':'url(#ar-gray)');
  path.dataset.ns=(e.ns||[]).join(',');
  path.dataset.i=i;
  wires.appendChild(path);
  if(e.label){
    const t=document.createElementNS(NS,'text');
    t.setAttribute('x',e.lp[0]); t.setAttribute('y',e.lp[1]); t.setAttribute('class','elabel');
    t.textContent=e.label; wires.appendChild(t);
  }
});

// nós
const nodeEls={};
Object.entries(NODES).forEach(([id,n])=>{
  const el=document.createElement('div');
  el.className='node'+(n.acc==='dark'?' dark':'')+(n.variant?(' '+n.variant):'');
  el.style.cssText=`left:${n.x}px;top:${n.y}px;width:${n.w}px;height:${n.h}px`;
  el.style.setProperty('--acc',`var(--${n.acc})`);
  el.dataset.id=id;
  const badges = n.badges ? `<div class="badges">${n.badges.map(b=>`<span class="badge b-${b}">${b}</span>`).join('')}</div>` : '';
  el.innerHTML =
    `<div class="top"><span class="chip">${ic(n.ic)}</span><div class="nt">${n.t}</div></div>
     <div class="ns">${n.s}</div>${badges}`;
  el.addEventListener('mouseenter',()=>highlight(id,true));
  el.addEventListener('mouseleave',()=>highlight(id,false));
  el.addEventListener('click',()=>openModal(id));
  stage.appendChild(el);
  nodeEls[id]=el;
});

/* =========================================================================
   9) HOVER · destaque de conexões
   ========================================================================= */
function highlight(id,on){
  nodeEls[id].classList.toggle('hl',on);
  wires.querySelectorAll('path').forEach(p=>{
    if((p.dataset.ns||'').split(',').includes(id)){
      p.classList.toggle('hot',on);
      // realça também o outro nó da conexão
      (p.dataset.ns||'').split(',').forEach(o=>{ if(o&&o!==id&&nodeEls[o]) nodeEls[o].classList.toggle('hl',on); });
    }
  });
}

/* =========================================================================
   10) MODAL
   ========================================================================= */
const overlay=document.getElementById('overlay'), modal=document.getElementById('modal');
function openModal(id){
  const n=NODES[id];
  modal.style.setProperty('--macc',`var(--${n.acc})`);
  document.getElementById('mCat').textContent=n.cat;
  document.getElementById('mIcon').innerHTML=ic(n.ic);
  document.getElementById('mTitle').textContent=n.t;
  document.getElementById('mSub').textContent=n.s;
  document.getElementById('mDesc').textContent=n.d;
  overlay.classList.add('open'); modal.classList.add('open');
}
function closeModal(){ overlay.classList.remove('open'); modal.classList.remove('open'); }
document.getElementById('mClose').onclick=closeModal;
overlay.onclick=closeModal;
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* =========================================================================
   11) ANIMAÇÃO DE FLUXO (dash em marcha + partículas na rota principal)
   ========================================================================= */
let playing=false, raf=null;
const flowPts = [...EDGES[9].p, ...EDGES[10].p, ...EDGES[11].p]; // master→tool→stream→result
function segLen(a,b){ return Math.hypot(b[0]-a[0],b[1]-a[1]); }
function totalLen(pts){ let L=0; for(let i=1;i<pts.length;i++) L+=segLen(pts[i-1],pts[i]); return L; }
function pointAt(pts,dist){
  for(let i=1;i<pts.length;i++){ const l=segLen(pts[i-1],pts[i]);
    if(dist<=l){ const t=dist/l; return [pts[i-1][0]+(pts[i][0]-pts[i-1][0])*t, pts[i-1][1]+(pts[i][1]-pts[i-1][1])*t]; }
    dist-=l; } return pts[pts.length-1];
}
const flowLen=totalLen(flowPts);
let dots=[];
function ensureDots(){
  if(dots.length) return;
  for(let k=0;k<3;k++){ const c=document.createElementNS(NS,'circle'); c.setAttribute('r','5'); parts.appendChild(c); dots.push(c); }
}
function tick(ts){
  const speed=0.16; // px/ms
  dots.forEach((c,k)=>{
    const d=((ts*speed)+(k*flowLen/3))%flowLen;
    const [x,y]=pointAt(flowPts,d);
    c.setAttribute('cx',x); c.setAttribute('cy',y);
  });
  raf=requestAnimationFrame(tick);
}
document.getElementById('playBtn').onclick=function(){
  playing=!playing;
  this.classList.toggle('on',playing);
  this.textContent=playing?'⏸ Pausar fluxo':'▶ Animar fluxo';
  wires.classList.toggle('playing',playing);
  if(playing){ ensureDots(); raf=requestAnimationFrame(tick); }
  else{ cancelAnimationFrame(raf); dots.forEach(c=>c.setAttribute('cx',-99)); }
};

/* =========================================================================
   12) ESCALA RESPONSIVA (canvas 1200 → largura do frame)
   ========================================================================= */
const frame=document.getElementById('frame'), scaler=document.getElementById('scaler');
function fit(){
  const avail=frame.clientWidth-4;
  const scale=Math.min(1, avail/1200);
  scaler.style.transform=`scale(${scale})`;
  scaler.style.width=(1200*scale)+'px';
  scaler.style.height=(790*scale)+'px';
  // centraliza quando menor que o frame
  scaler.style.marginLeft = avail>1200 ? ((avail-1200)/2)+'px' : '0';
}
window.addEventListener('resize',fit);
document.getElementById('fitBtn').onclick=fit;
fit();
</script>
